<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>الكويز - تيم دحيحة ZNU</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="quiz.css">
</head>
<body>
  <div class="container" id="quizContainer">
    <div id="quizCard" class="card">
      <h2 id="quizTitle">الكويز</h2>
      
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div id="quizQuestionArea">
        <h3 id="quizQuestion"></h3>
        <div id="quizOptions"></div>
        <div class="controls">
          <button id="nextQuestion">التالي</button>
          <span id="quizProgressText"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="container" id="resultContainer" style="display: none;">
    <div id="resultCard" class="card result-card">
      <div class="confetti-icon">
        <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🎉</text></svg>" alt="Confetti">
      </div>
      <h2>نتيجة الكويز</h2>
      <p class="result-name">أحسنت يا <span id="resName" class="highlight"></span>!</p>
      <p class="result-subject">لقد أكملت كويز <span id="resSubject" class="highlight"></span></p>
      
      <div class="progress-circle" id="progressCircle">
        <div class="progress-circle-inner">
          <span id="scoreText" class="score-number"></span>
          <span class="score-total" id="scoreTotal"></span>
        </div>
      </div>

      <div class="rank-badge">
        <span class="rank-star">⭐</span> <strong>الرتبة:</strong> <span id="resRank" class="rank-text"></span>
        <br>
        <span class="points-icon">🪙</span> <strong>مكافأة:</strong> <span id="resPoints" class="points-text"></span>
      </div>

      <p class="feedback-msg" id="feedbackMsg"></p>
      
      <button id="returnHome" class="btn-return">العودة للرئيسية</button>
    </div>
  </div>

  <script src="quiz.js"></script>
</body>
</html>
